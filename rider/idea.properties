# File Size Limits (KB) for large monorepos
idea.max.intellisense.filesize=5000
idea.max.content.load.filesize=25000
idea.filewatcher.max.file.size=5000
# Console buffer (KB)
idea.cycle.buffer.size=2048
# Classpath handling (Windows-safe for very long classpaths)
idea.dynamic.classpath=true
idea.dynamic.classpath.jar=true
# Index/cache/log locations
idea.system.path=${user.home}/.Rider/system
idea.log.path=${user.home}/.Rider/log
# UI / windowing
ide.ui.new.file.chooser=true
ide.tree.horizontal.default.autoscrolling=false
ide.win.frame.decoration=true
# Process management
idea.jvm.disable.policyfiles=true
# Network timeouts (ms)
ide.connection.timeout=10000
ide.connection.read.timeout=20000
